<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My CI/CD Website</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h1 { color: #58a6ff; font-size: 2.5rem; }
    p  { color: #8b949e; font-size: 1.1rem; }
    .badge {
      background: #238636;
      color: white;
      padding: 8px 20px;
      border-radius: 20px;
      margin-top: 20px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <h1>🚀 Hello from CI/CD!</h1>
  <p>This website was deployed automatically using GitHub Actions.</p>
  <div class="badge">✅ Pipeline is Working!</div>
</body>
</html>
